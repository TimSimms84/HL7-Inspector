<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HL7 Inspector</title>
<style>
:root {
  /* Accent (indigo) */
  --accent:        #4f46e5;
  --accent-dark:   #4338ca;
  --accent-hover:  #e0e7ff;
  --accent-border: #a5b4fc;
  --accent-pale:   #c7d2fe;
  --accent-dim:    #6366f1;
  --accent-soft:   #818cf8;
  --accent-text:   #3730a3;

  /* Neutrals */
  --dark:          #1a1a2e;
  --text:          #111827;
  --text-secondary:#374151;
  --text-muted:    #6b7280;
  --text-subtle:   #9ca3af;
  --text-faint:    #d1d5db;

  /* Surfaces & borders */
  --bg-page:       #f0f2f5;
  --bg-subtle:     #f9fafb;
  --bg-muted:      #f3f4f6;
  --border:        #e5e7eb;
  --border-input:  #d1d5db;
  --border-faint:  #f3f4f6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-page); color: var(--dark); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

header { background: var(--dark); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
header h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.3px; }
.badge { background: var(--accent); font-size: 0.65rem; padding: 2px 7px; border-radius: 999px; font-weight: 500; }

.input-area { padding: 12px 20px; background: white; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.input-row label { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.btn-clear { font-size: 0.7rem; padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; background: white; color: var(--text-muted); cursor: pointer; }
.btn-clear:hover { background: var(--bg-muted); }
textarea {
  width: 100%; height: 80px; font-family: 'Consolas', 'Courier New', monospace;
  font-size: 0.78rem; padding: 8px 10px; border: 1px solid var(--border-input);
  border-radius: 6px; resize: vertical; background: var(--bg-subtle); color: var(--text); line-height: 1.5;
}
textarea:focus { outline: none; border-color: var(--accent); background: white; }

.workspace { display: flex; flex: 1; overflow: hidden; }

.segments-panel { flex: 1; overflow-y: auto; padding: 14px 20px; }
.segments-panel h2 { font-size: 0.65rem; font-weight: 600; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.empty-state { color: var(--text-subtle); font-size: 0.85rem; text-align: center; margin-top: 40px; }

.segment-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; background: white; border-radius: 7px; padding: 8px 10px; border: 1px solid var(--border); }
.segment-row:hover { border-color: var(--accent-pale); }

.seg-badge { font-family: 'Consolas', monospace; font-size: 0.72rem; font-weight: 700; padding: 3px 7px; border-radius: 4px; min-width: 40px; text-align: center; flex-shrink: 0; cursor: default; }
.seg-MSH      { background: #ede9fe; color: #5b21b6; }
.seg-patient  { background: #dbeafe; color: #1d4ed8; }
.seg-order    { background: #ffedd5; color: #c2410c; }
.seg-rx       { background: #dcfce7; color: #166534; }
.seg-obs      { background: #cffafe; color: #0e7490; }
.seg-clinical { background: #fee2e2; color: #b91c1c; }
.seg-misc     { background: var(--bg-muted); color: var(--text-secondary); }

.fields-wrap { display: flex; flex-wrap: wrap; gap: 3px; flex: 1; }

.field-chip {
  font-family: 'Consolas', monospace; font-size: 0.72rem;
  padding: 2px 6px; border-radius: 4px;
  background: var(--bg-muted); border: 1px solid var(--border);
  cursor: pointer; position: relative;
  max-width: 160px; overflow: visible; white-space: nowrap;
  color: var(--text-secondary); transition: background 0.1s, border-color 0.1s; user-select: none;
}
.field-chip:hover { background: var(--accent-hover); border-color: var(--accent-border); color: var(--accent-text); }
.field-chip.active { background: var(--accent); border-color: var(--accent-dark); color: white; }
.field-chip.empty { color: var(--text-faint); border-style: dashed; }
.field-chip.empty:hover { background: var(--accent-hover); border-color: var(--accent-border); color: var(--accent-soft); border-style: dashed; }
.field-chip.active.empty { color: var(--accent-pale); }

.field-chip .tip {
  display: none; position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
  background: var(--text); color: white; font-size: 0.68rem; padding: 3px 7px; border-radius: 4px;
  white-space: nowrap; z-index: 200; pointer-events: none; font-family: sans-serif;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.field-chip .tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 4px solid transparent; border-top-color: var(--text); }
.field-chip:hover .tip { display: block; }
.field-chip.active .tip { display: none; }

.repeat-sup { font-size: 0.6rem; color: var(--accent-dim); margin-left: 1px; }
.field-chip.active .repeat-sup { color: var(--accent-pale); }

.side-panel {
  width: 290px; flex-shrink: 0; background: white; border-left: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.panel-header { padding: 12px 14px 0; border-bottom: 1px solid var(--border-faint); }
.panel-header h2 { font-size: 0.65rem; font-weight: 600; color: var(--text-subtle); text-transform: uppercase; letter-spacing: 0.5px; padding-bottom: 10px; }
.panel-empty { color: var(--text-subtle); font-size: 0.82rem; text-align: center; padding: 50px 20px; }
.panel-body { padding: 14px; flex: 1; }

.field-id { font-family: 'Consolas', monospace; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
.field-name { font-size: 0.82rem; color: var(--text-muted); margin-top: 2px; margin-bottom: 14px; }
.section-label { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-subtle); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
.raw-value {
  font-family: 'Consolas', monospace; font-size: 0.75rem; background: var(--bg-subtle);
  border-radius: 5px; padding: 7px 9px; word-break: break-all; color: var(--text);
  border: 1px solid var(--border); margin-bottom: 14px; position: relative;
}
.raw-value.empty-val { color: var(--text-subtle); font-style: italic; }
.copy-btn { font-size: 0.62rem; padding: 1px 6px; border: 1px solid var(--border); border-radius: 3px; background: white; color: var(--text-muted); cursor: pointer; }
.copy-btn:hover { background: var(--bg-muted); }

.divider { border: none; border-top: 1px solid var(--border-faint); margin: 12px 0; }

.repeat-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.repeat-tab { font-size: 0.68rem; padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: white; color: var(--text-muted); }
.repeat-tab.active { background: var(--accent); border-color: var(--accent-dark); color: white; }

.comp-row { margin-bottom: 8px; }
.comp-id { font-family: 'Consolas', monospace; font-size: 0.68rem; font-weight: 700; color: var(--accent); }
.comp-name { font-size: 0.68rem; color: var(--text-subtle); }
.comp-val { font-family: 'Consolas', monospace; font-size: 0.75rem; background: var(--bg-subtle); border-radius: 4px; padding: 3px 7px; margin-top: 2px; color: var(--text); border: 1px solid var(--border-faint); word-break: break-all; }
.comp-val.empty-comp { color: var(--text-faint); font-style: italic; font-size: 0.7rem; }

.summary-strip {
  display: none; align-items: center; gap: 16px; flex-wrap: wrap;
  padding: 7px 20px; background: var(--dark); border-bottom: 1px solid #2d2d4a;
  flex-shrink: 0;
}
.summary-strip.visible { display: flex; }
.summary-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #a5b4fc; }
.summary-item .summary-icon { font-size: 0.8rem; }
.summary-item .summary-label { color: #e0e7ff; font-weight: 500; }
</style>
</head>
<body>

<header>
  <h1>HL7 Inspector</h1>
  <!-- <span class="badge">Local</span> -->
</header>

<div class="summary-strip" id="summaryStrip"></div>

<div class="input-area">
  <div class="input-row">
    <label>Paste HL7 Message</label>
    <button class="btn-clear" onclick="clearAll()">Clear</button>
  </div>
  <textarea id="hl7input" placeholder="MSH|^~\&|..." spellcheck="false"></textarea>
</div>

<div class="workspace">
  <div class="segments-panel" id="segmentsPanel">
    <h2>Segments</h2>
    <div class="empty-state" id="emptyState">Paste an HL7 message above to inspect it.</div>
  </div>
  <div class="side-panel" id="sidePanel">
    <div class="panel-header"><h2>Field Detail</h2></div>
    <div id="panelEmpty" class="panel-empty">Click any field to inspect it.</div>
    <div id="panelBody" class="panel-body" style="display:none"></div>
  </div>
</div>

const HL7_COMPONENTS = {

  "PID-11": { 1:"Street Address", 2:"Other Designation", 3:"City", 4:"State", 5:"Zip Code", 6:"Country", 7:"Address Type", 8:"Other Geographic Designation", 9:"County Code" },

const SEG_CLASS = {
  MSH: 'seg-MSH',
  PID: 'seg-patient', PV1: 'seg-patient', PV2: 'seg-patient', NK1: 'seg-patient', GT1: 'seg-patient',
  ORC: 'seg-order',
  RXE: 'seg-rx', RXO: 'seg-rx', RXR: 'seg-rx', RXA: 'seg-rx', RXC: 'seg-rx', RXD: 'seg-rx', ZHH: 'seg-rx',
  OBR: 'seg-obs', OBX: 'seg-obs',
  AL1: 'seg-clinical', DG1: 'seg-clinical', IN1: 'seg-clinical',
};

function segClass(name) { return SEG_CLASS[name] || 'seg-misc'; }
function fieldName(seg, num) { return (HL7_FIELDS[seg] || {})[num] || null; }
function compName(seg, fnum, cnum) { return (HL7_COMPONENTS[`${seg}-${fnum}`] || {})[cnum] || null; }
function maxComp(seg, fnum) {
  const d = HL7_COMPONENTS[`${seg}-${fnum}`];
  return d ? Math.max(...Object.keys(d).map(Number)) : 0;
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function parseHL7(text) {
  let lines = text.split(/\r\n|\r|\n/).map(l => l.trim()).filter(l => l.length >= 3);

  // Single-line paste — SQL grid copies often replace the HL7 \r segment terminator
  // with a space. Split on whitespace that immediately precedes a segment name (3 chars + pipe).
  // The \s+ requirement prevents splitting on field values like ADT|NHHPC where | follows
  // a pipe separator, not whitespace.
  if (lines.length <= 1 && lines[0] && /^MSH\|/.test(lines[0])) {
    const bySpace = lines[0].split(/\s+(?=[A-Z][A-Z0-9]{2}\|)/).map(l => l.trim()).filter(l => l.length >= 3);
    if (bySpace.length > 1) lines = bySpace;
  }

  return lines.map(line => ({ name: line.substring(0,3), raw: line.split('|') }));
}

let activeChip = null;

function renderSummary(segments) {
  const strip = document.getElementById('summaryStrip');
  strip.innerHTML = '';

  // Patient name from PID-5 (family^given)
  const pid = segments.find(s => s.name === 'PID');
  if (pid && pid.raw[5]) {
    const parts = pid.raw[5].split('^');
    const family = parts[0] || '';
    const given  = parts[1] || '';
    const name   = [family, given].filter(Boolean).join(', ');
    if (name) strip.innerHTML += `<div class="summary-item"><span class="summary-icon">👤</span><span class="summary-label">${esc(name)}</span></div>`;
  }

  const counts = [
    { name: 'ORC', icon: '💊', singular: 'Order',     plural: 'Orders'    },
    { name: 'AL1', icon: '⚠️',  singular: 'Allergy',   plural: 'Allergies' },
    { name: 'DG1', icon: '🩺',  singular: 'Diagnosis', plural: 'Diagnoses' },
  ];

  counts.forEach(({ name, icon, singular, plural }) => {
    const n = segments.filter(s => s.name === name).length;
    if (n > 0) {
      strip.innerHTML += `<div class="summary-item"><span class="summary-icon">${icon}</span><span class="summary-label">${n} ${n === 1 ? singular : plural}</span></div>`;
    }
  });

  strip.classList.toggle('visible', strip.children.length > 0);
}

function renderSegments(segments) {
  const panel = document.getElementById('segmentsPanel');
  panel.querySelectorAll('.segment-row').forEach(e => e.remove());
  document.getElementById('emptyState').style.display = segments.length ? 'none' : 'block';
  renderSummary(segments);

  segments.forEach(seg => {
    const row = document.createElement('div');
    row.className = 'segment-row';

    const badge = document.createElement('span');
    badge.className = `seg-badge ${segClass(seg.name)}`;
    badge.textContent = seg.name;
    row.appendChild(badge);

    const wrap = document.createElement('div');
    wrap.className = 'fields-wrap';
    const isMSH = seg.name === 'MSH';

    if (isMSH) wrap.appendChild(makeChip(seg.name, 1, '|'));

    for (let i = 1; i < seg.raw.length; i++) {
      wrap.appendChild(makeChip(seg.name, isMSH ? i + 1 : i, seg.raw[i]));
    }

    row.appendChild(wrap);
    panel.appendChild(row);
  });
}

function makeChip(segName, fieldNum, value) {
  const chip = document.createElement('span');
  const empty = value === '';
  chip.className = 'field-chip' + (empty ? ' empty' : '');

  const display = empty ? '—' : (value.length > 22 ? value.substring(0,20) + '…' : value);

  const tip = document.createElement('span');
  tip.className = 'tip';
  const fn = fieldName(segName, fieldNum);
  tip.textContent = `${segName}-${fieldNum}` + (fn ? `: ${fn}` : '');

  const textSpan = document.createElement('span');
  textSpan.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:140px;vertical-align:bottom;';
  textSpan.textContent = display;
  chip.appendChild(textSpan);
  chip.appendChild(tip);

  // MSH-1 and MSH-2 define the encoding characters — never treat ~ or ^ as delimiters there
  const isEncodingField = segName === 'MSH' && (fieldNum === 1 || fieldNum === 2);
  if (!isEncodingField && value.includes('~')) {
    const sup = document.createElement('sup');
    sup.className = 'repeat-sup';
    sup.textContent = `×${value.split('~').length}`;
    chip.appendChild(sup);
  }

  chip.addEventListener('click', e => {
    e.stopPropagation();
    if (activeChip) activeChip.classList.remove('active');
    chip.classList.add('active');
    activeChip = chip;
    showDetail(segName, fieldNum, value);
  });

  return chip;
}

function showDetail(segName, fieldNum, value) {
  document.getElementById('panelEmpty').style.display = 'none';
  const body = document.getElementById('panelBody');
  body.style.display = 'block';

  const fn = fieldName(segName, fieldNum) || 'Unknown Field';
  const empty = value === '';
  const isEncodingField = segName === 'MSH' && (fieldNum === 1 || fieldNum === 2);
  const repeats = (!isEncodingField && value.split('~')) || [value];
  const hasComponents = !isEncodingField && repeats.some(r => r.includes('^'));
  const hasDict = !isEncodingField && !!HL7_COMPONENTS[`${segName}-${fieldNum}`];

  let html = `
    <div class="field-id">${segName}-${fieldNum}</div>
    <div class="field-name">${fn}</div>
    <div class="section-label">
      Raw Value
      ${!empty ? `<button class="copy-btn" onclick="copyText(${JSON.stringify(value)})">Copy</button>` : ''}
    </div>
    <div class="raw-value ${empty ? 'empty-val' : ''}">${empty ? '(empty)' : esc(value)}</div>
  `;

  if (!empty && (hasComponents || hasDict)) {
    if (repeats.length > 1) {
      html += `<hr class="divider">
        <div class="section-label">Components — ${repeats.length} repeats</div>
        <div class="repeat-tabs" id="repeatTabs">`;
      repeats.forEach((_, i) => {
        html += `<button class="repeat-tab${i===0?' active':''}" onclick="switchRepeat(${i})">${i+1}</button>`;
      });
      html += `</div>`;
      repeats.forEach((repeat, i) => {
        html += `<div id="repeatPane${i}" style="${i>0?'display:none':''}">`;
        html += renderComponents(segName, fieldNum, repeat);
        html += `</div>`;
      });
    } else {
      html += `<hr class="divider"><div class="section-label">Components</div>`;
      html += renderComponents(segName, fieldNum, value);
    }
  } else if (!empty && repeats.length > 1) {
    html += `<hr class="divider"><div class="section-label">Repeats (${repeats.length})</div>`;
    repeats.forEach((r, i) => {
      html += `<div class="comp-val" style="margin-bottom:4px">${i+1}. ${esc(r)||'<em style="color:#9ca3af">(empty)</em>'}</div>`;
    });
  }

  body.innerHTML = html;
}

function renderComponents(segName, fieldNum, value) {
  const parts = value.split('^');
  const total = Math.max(parts.length, maxComp(segName, fieldNum));
  let html = '';
  for (let i = 0; i < total; i++) {
    const cnum = i + 1;
    const cn = compName(segName, fieldNum, cnum);
    const cv = i < parts.length ? parts[i] : '';
    if (!cn && cv === '') continue;
    html += `<div class="comp-row">
      <div><span class="comp-id">.${cnum}</span>${cn ? `<span class="comp-name"> — ${cn}</span>` : ''}</div>
      <div class="comp-val ${cv===''?'empty-comp':''}">${cv==='' ? '(empty)' : esc(cv)}</div>
    </div>`;
  }
  return html || `<div style="color:#9ca3af;font-size:0.78rem;padding:4px 0">No component breakdown available.</div>`;
}

function switchRepeat(idx) {
  document.querySelectorAll('.repeat-tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('[id^=repeatPane]').forEach((p,i) => p.style.display = i===idx ? '' : 'none');
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el);
  });
}

function clearAll() {
  document.getElementById('hl7input').value = '';
  document.querySelectorAll('.segment-row').forEach(e => e.remove());
  document.getElementById('emptyState').style.display = 'block';
  const strip = document.getElementById('summaryStrip');
  strip.innerHTML = '';
  strip.classList.remove('visible');
  resetPanel();
}

function resetPanel() {
  activeChip = null;
  document.getElementById('panelEmpty').style.display = 'block';
  document.getElementById('panelBody').style.display = 'none';
  document.getElementById('panelBody').innerHTML = '';
}

document.getElementById('hl7input').addEventListener('input', function() {
  resetPanel();
  const text = this.value.trim();
  if (!text) {
    document.querySelectorAll('.segment-row').forEach(e => e.remove());
    document.getElementById('emptyState').style.display = 'block';
    return;
  }
  renderSegments(parseHL7(text));
});

document.addEventListener('click', e => {
  if (!e.target.closest('.field-chip') && !e.target.closest('#sidePanel')) {
    if (activeChip) { activeChip.classList.remove('active'); activeChip = null; }
  }
});
</script>
</body>
</html>
